<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Nueva Cita')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: sidebar('citas')}"></nav>

    <div class="main-content">
        <div class="topbar d-flex align-items-center gap-3">
            <a href="/citas" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i></a>
            <div>
                <h5 class="mb-0 fw-bold">Nueva Cita Médica</h5>
                <small class="text-muted">Complete los datos para agendar</small>
            </div>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card" style="max-width: 750px;">
            <div class="card-header">
                <span class="fw-600"><i class="bi bi-calendar-plus me-2 text-primary"></i>Datos de la Cita</span>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Paciente <span class="text-danger">*</span></label>
                            <select name="pacienteId" class="form-select"
                                th:classappend="${#fields.hasErrors('paciente')} ? 'is-invalid'">
                                <option value="">— Seleccione Paciente —</option>
                                <option th:each="p : ${pacientes}" th:value="${p.id}"
                                    th:selected="${p.id == pacientePreId}"
                                    th:text="${p.nombre + ' ' + p.apellido + ' (DNI: ' + p.dni + ')'}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('paciente')}"
                                th:errors="*{paciente}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Médico Especialista <span class="text-danger">*</span></label>
                            <select name="medicoId" class="form-select"
                                th:classappend="${#fields.hasErrors('medico')} ? 'is-invalid'">
                                <option value="">— Seleccione Médico —</option>
                                <option th:each="m : ${medicos}" th:value="${m.id}" th:selected="${m.id == medicoPreId}"
                                    th:text="${'Dr. ' + m.nombre + ' ' + m.apellido + ' (' + m.especialidad + ')'}">
                                </option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('medico')}" th:errors="*{medico}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Fecha y Hora <span class="text-danger">*</span></label>
                            <input type="datetime-local" th:field="*{fechaHora}" class="form-control"
                                th:classappend="${#fields.hasErrors('fechaHora')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaHora')}"
                                th:errors="*{fechaHora}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Motivo de Consulta <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{motivo}" class="form-control"
                                th:classappend="${#fields.hasErrors('motivo')} ? 'is-invalid'"
                                placeholder="Ej: Control Mensual">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('motivo')}" th:errors="*{motivo}">
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Detalles adicionales / Observaciones <span
                                    class="text-muted">(Opcional)</span></label>
                            <textarea th:field="*{observaciones}" class="form-control" rows="3"
                                placeholder="Antecedentes, síntomas específicos, etc."></textarea>
                        </div>

                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">Agendar Cita</button>
                        <a href="/citas" class="btn btn-light px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Lógica para mapear Datalist a Input Hidden
        function setupDatalistMapping(inputId, datalistId, hiddenId) {
            const input = document.getElementById(inputId);
            const datalist = document.getElementById(datalistId);
            const hidden = document.getElementById(hiddenId);

            input.addEventListener('change', function () {
                const option = Array.from(datalist.options).find(opt => opt.value === this.value);
                if (option) {
                    hidden.value = option.getAttribute('data-id');
                    this.classList.remove('is-invalid');
                } else {
                    hidden.value = "";
                    this.classList.add('is-invalid');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            setupDatalistMapping('pacienteSearch', 'listaPacientes', 'pacienteIdReal');
            setupDatalistMapping('medicoSearch', 'listaMedicos', 'medicoIdReal');

            // Validación de fecha futura
            document.getElementById('fechaCita').addEventListener('change', function () {
                const ahora = new Date();
                if (new Date(this.value) < ahora) {
                    this.setCustomValidity('Inválido');
                    this.classList.add('is-invalid');
                } else {
                    this.setCustomValidity('');
                    this.classList.remove('is-invalid');
                }
            });

        });
    </script>
</body>

</html>
