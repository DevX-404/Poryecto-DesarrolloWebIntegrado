<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nueva Cita')}"></head>
<body>

<nav th:replace="~{fragments/layout :: sidebar('citas')}"></nav>

<div class="main-content">
    <div class="topbar d-flex align-items-center gap-3">
        <a href="/citas" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i></a>
        <div>
            <h5 class="mb-0 fw-bold">Nueva Cita Médica</h5>
            <small class="text-muted">Complete los datos para agendar</small>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="card" style="max-width: 650px;">
        <div class="card-header">
            <span class="fw-600">
                <i class="bi bi-calendar-plus me-2 text-primary"></i>
                Datos de la Cita
            </span>
        </div>
        <div class="card-body p-4">
    <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Paciente <span class="text-danger">*</span></label>
                <select name="pacienteId" class="form-select" required>
                    <option value="">— Seleccione Paciente —</option>
                    <option th:each="p : ${pacientes}" th:value="${p.id}" 
                            th:text="${p.nombre + ' ' + p.apellido + ' (DNI: ' + p.dni + ')'}"></option>
                </select>
            </div>
            
            <div class="col-md-6">
                <label class="form-label">Médico Especialista <span class="text-danger">*</span></label>
                <select name="medicoId" class="form-select" required>
                    <option value="">— Seleccione Médico —</option>
                    <option th:each="m : ${medicos}" th:value="${m.id}" 
                            th:text="${'Dr. ' + m.nombre + ' ' + m.apellido + ' (' + m.especialidad + ')'}"></option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Fecha y Hora <span class="text-danger">*</span></label>
                <input type="datetime-local" th:field="*{fechaHora}" class="form-control" id="fechaCita" required>
                <div class="invalid-feedback">No se pueden agendar citas en el pasado.</div>
            </div>
            
            <div class="col-md-6">
                <label class="form-label">Motivo de Consulta</label>
                <input type="text" th:field="*{motivo}" class="form-control" placeholder="Ej: Control Mensual" required>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-calendar-check me-1"></i>Agendar Cita</button>
            <a href="/citas" class="btn btn-light px-4">Cancelar</a>
        </div>
    </form>
</div>

<script>
    // Validación profesional: No permitir fechas pasadas en el UI
    document.getElementById('fechaCita').addEventListener('blur', function() {
        const ahora = new Date();
        const fechaSeleccionada = new Date(this.value);
        if (fechaSeleccionada < ahora) {
            this.classList.add('is-invalid');
            this.value = '';
        } else {
            this.classList.remove('is-invalid');
            this.classList.add('is-valid');
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
