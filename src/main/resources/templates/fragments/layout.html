<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' — Consultorio Médico'">Consultorio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: 240px; min-height: 100vh; background: #1a2035; position: fixed; top: 0; left: 0; z-index: 100; transition: all .3s; }
        .sidebar .brand { padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.08); }
        .sidebar .brand h6 { color: #fff; font-weight: 700; margin: 0; font-size: .95rem; letter-spacing: .5px; }
        .sidebar .brand small { color: rgba(255,255,255,.45); font-size: .72rem; }
        .sidebar .nav-link { color: rgba(255,255,255,.65); padding: .65rem 1.25rem; border-radius: 8px; margin: 2px 10px; font-size: .875rem; display: flex; align-items: center; gap: 10px; transition: all .2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
        .sidebar .nav-link i { font-size: 1rem; width: 20px; text-align: center; }
        .sidebar .nav-section { color: rgba(255,255,255,.3); font-size: .68rem; letter-spacing: 1px; text-transform: uppercase; padding: 1rem 1.35rem .35rem; font-weight: 600; }
        .main-content { margin-left: 240px; padding: 1.75rem 2rem; }
        .topbar { background: #fff; border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: between; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
        .card-header { background: #fff; border-bottom: 1px solid #f0f0f0; border-radius: 12px 12px 0 0 !important; padding: .9rem 1.25rem; }
        .table th { font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; color: #6c757d; font-weight: 600; border-bottom-width: 1px; }
        .table td { vertical-align: middle; font-size: .875rem; }
        .badge { font-weight: 500; font-size: .72rem; padding: .35em .65em; }
        .btn-sm { font-size: .78rem; padding: .3rem .65rem; border-radius: 6px; }
        .stat-card { background: #fff; border-radius: 12px; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
        .form-label { font-size: .85rem; font-weight: 500; color: #495057; margin-bottom: .35rem; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #e0e0e0; font-size: .875rem; }
        .form-control:focus, .form-select:focus { border-color: #4361ee; box-shadow: 0 0 0 3px rgba(67,97,238,.12); }
        .alert { border: none; border-radius: 10px; font-size: .875rem; }
    </style>
</head>

<nav th:fragment="sidebar(paginaActiva)" class="sidebar">
    <div class="brand">
        <h6><i class="bi bi-hospital me-2" style="color:#4cc9f0"></i>ConsultorioPro</h6>
        <small>Sistema de Gestión Médica</small>
    </div>
    <div class="pt-2">
        <div class="nav-section">Principal</div>
        <a href="/" class="nav-link" th:classappend="${paginaActiva == 'dashboard'} ? 'active'">
            <i class="bi bi-grid-1x2"></i> Dashboard
        </a>
        <div class="nav-section">Gestión</div>
        <a href="/pacientes" class="nav-link" th:classappend="${paginaActiva == 'pacientes'} ? 'active'">
            <i class="bi bi-people"></i> Pacientes
        </a>
        <a href="/citas" class="nav-link" th:classappend="${paginaActiva == 'citas'} ? 'active'">
            <i class="bi bi-calendar-check"></i> Citas Médicas
        </a>
        <a href="/medicos" class="nav-link" th:classappend="${paginaActiva == 'medicos'} ? 'active'">
            <i class="bi bi-stethoscope"></i> Personal Médico
        </a>
        <div class="nav-section">API REST</div>
        <a href="/swagger-ui.html" class="nav-link" target="_blank">
            <i class="bi bi-code-slash"></i> Documentación API
        </a>
    </div>
</nav>

<div th:fragment="alerts">
    <div th:if="${mensajeExito}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${mensajeExito}"></span>
    </div>
    <div th:if="${mensajeError}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${mensajeError}"></span>
    </div>
</div>
</html>
