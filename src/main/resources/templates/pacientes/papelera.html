<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Papelera de Pacientes')}"></head>
<body>

<nav th:replace="~{fragments/layout :: sidebar('pacientes')}"></nav>

<div class="main-content">
    <div class="topbar d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <a href="/pacientes" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i></a>
            <div>
                <h5 class="mb-0 fw-bold">Pacientes Archivados</h5>
                <small class="text-muted">Registros eliminados lógicamente</small>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="card">
        <div class="card-header">
            <span class="fw-600">
                <i class="bi bi-trash3 me-2 text-danger"></i>
                Papelera de Reciclaje
                <span class="badge bg-danger ms-1" th:text="${#lists.size(pacientes)}"></span>
            </span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Paciente</th>
                        <th>DNI</th>
                        <th>Email</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(pacientes)}">
                        <td colspan="5" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                            La papelera está vacía.
                        </td>
                    </tr>
                    <tr th:each="p : ${pacientes}">
                        <td class="ps-3 text-muted" th:text="${p.id}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white bg-secondary"
                                     style="width:34px;height:34px;font-size:.8rem;flex-shrink:0"
                                     th:text="${#strings.substring(p.nombre,0,1) + #strings.substring(p.apellido,0,1)}">
                                </div>
                                <div class="fw-500" th:text="${p.nombre + ' ' + p.apellido}"></div>
                            </div>
                        </td>
                        <td th:text="${p.dni}"></td>
                        <td th:text="${p.email ?: '—'}"></td>
                        <td class="text-center">
                            <a th:href="@{/pacientes/restaurar/{id}(id=${p.id})}"
                               class="btn btn-outline-success btn-sm"
                               title="Restaurar Paciente"
                               onclick="return confirm('¿Desea restaurar a este paciente en la lista activa?')">
                                <i class="bi bi-arrow-counterclockwise me-1"></i>Restaurar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
