<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Pacientes')}"></head>
<body>

<nav th:replace="~{fragments/layout :: sidebar('pacientes')}"></nav>

<div class="main-content">
    <div class="topbar d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0 fw-bold">Pacientes</h5>
            <small class="text-muted">Gestión de pacientes registrados</small>
        </div>
        <a href="/pacientes/papelera" class="btn btn-outline-secondary btn-sm px-3">
            <i class="bi bi-archive me-1"></i>Ver Papelera
        </a>
        <a href="/pacientes/nuevo" class="btn btn-primary btn-sm px-3">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Paciente
        </a>
    </div>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="fw-600"><i class="bi bi-people me-2 text-primary"></i>
                Listado de Pacientes
                <span class="badge bg-primary ms-1" th:text="${#lists.size(pacientes)}"></span>
            </span>
            <!-- Barra de búsqueda -->
            <form th:action="@{/pacientes}" method="get" class="d-flex gap-2" style="min-width:280px">
                <input type="text" name="nombre" class="form-control form-control-sm"
                       placeholder="Buscar por nombre o apellido..."
                       th:value="${busqueda}">
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-search"></i>
                </button>
                <a href="/pacientes" class="btn btn-outline-secondary btn-sm" th:if="${busqueda}">
                    <i class="bi bi-x"></i>
                </a>
            </form>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Paciente</th>
                        <th>DNI</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Fecha de Nacimiento</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(pacientes)}">
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-person-x fs-2 d-block mb-2"></i>
                            No se encontraron pacientes.
                            <a href="/pacientes/nuevo">Registrar el primero</a>
                        </td>
                    </tr>
                    <tr th:each="p : ${pacientes}">
                        <td class="ps-3 text-muted" th:text="${p.id}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white"
                                     style="width:34px;height:34px;background:#4361ee;font-size:.8rem;flex-shrink:0"
                                     th:text="${#strings.substring(p.nombre,0,1) + #strings.substring(p.apellido,0,1)}">
                                </div>
                                <div>
                                    <div class="fw-500" th:text="${p.nombre + ' ' + p.apellido}"></div>
                                </div>
                            </div>
                        </td>
                        <td th:text="${p.dni}"></td>
                        <td th:text="${p.telefono ?: '—'}"></td>
                        <td th:text="${p.email ?: '—'}"></td>
                        <td th:text="${p.fechaNacimiento != null ? #temporals.format(p.fechaNacimiento, 'dd/MM/yyyy') : '—'}"></td>
                        <td class="text-center">
                            <a th:href="@{/pacientes/editar/{id}(id=${p.id})}"
                               class="btn btn-outline-primary btn-sm me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/citas/nueva(pacienteId=${p.id})}"
                               class="btn btn-outline-success btn-sm me-1"
                               title="Agendar cita">
                                <i class="bi bi-calendar-plus"></i>
                            </a>
                            <a th:href="@{/pacientes/eliminar/{id}(id=${p.id})}"
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('¿Eliminar este paciente?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
