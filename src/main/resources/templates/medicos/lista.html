<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Personal Médico')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: sidebar('medicos')}"></nav>

    <div class="main-content">
        <div class="topbar d-flex justify-content-between align-items-center">
            <div>
                <h5 class="mb-0 fw-bold">Personal Médico</h5>
                <small class="text-muted">Gestión de especialistas y disponibilidad</small>
            </div>
            <a href="/medicos/nuevo" class="btn btn-primary btn-sm px-3">
                <i class="bi bi-person-plus-fill me-1"></i>Nuevo Médico
            </a>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card">
            <div class="card-header">
                <span class="fw-600"><i class="bi bi-stethoscope me-2 text-primary"></i>Staff Médico Activo</span>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">#</th>
                            <th>Médico</th>
                            <th>Especialidad</th>
                            <th>CMP</th>
                            <th>Contacto</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${medicos}">
                            <td class="ps-3 text-muted" th:text="${m.id}"></td>
                            <td>
                                <div class="fw-500" th:text="${'Dr. ' + m.nombre + ' ' + m.apellido}"></div>
                            </td>
                            <td><span class="badge bg-info text-dark" th:text="${m.especialidad}"></span></td>
                            <td th:text="${m.cmp}"></td>
                            <td th:text="${m.email}"></td>
                            <td class="text-center">
                                <a th:href="@{/medicos/eliminar/{id}(id=${m.id})}" 
                                   class="btn btn-outline-danger btn-sm"
                                   onclick="return confirm('¿Desea dar de baja a este médico?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
