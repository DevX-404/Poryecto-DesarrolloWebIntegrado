<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Registrar Médico')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: sidebar('medicos')}"></nav>

    <div class="main-content">
        <div class="topbar d-flex align-items-center gap-3">
            <a href="/medicos" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i></a>
            <div>
                <h5 class="mb-0 fw-bold" th:text="${titulo}">Registrar Médico</h5>
                <small class="text-muted">Ingreso de personal especializado</small>
            </div>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card" style="max-width: 700px;">
            <div class="card-header">
                <span class="fw-600"><i class="bi bi-stethoscope me-2 text-primary"></i>Datos Profesionales</span>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/medicos/guardar}" th:object="${medico}" method="post" class="needs-validation"
                    novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombres <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{nombre}" class="form-control" required minlength="3"
                                th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                            <div class="invalid-feedback">El nombre es obligatorio (mín. 3 letras).</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Apellidos <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{apellido}" class="form-control" required minlength="3"
                                th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'">
                            <div class="invalid-feedback">El apellido es obligatorio.</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Especialidad <span class="text-danger">*</span></label>
                            <select th:field="*{especialidad}" class="form-select" required
                                th:classappend="${#fields.hasErrors('especialidad')} ? 'is-invalid'">
                                <option value="">— Seleccione —</option>
                                <option value="Medicina General">Medicina General</option>
                                <option value="Pediatría">Pediatría</option>
                                <option value="Ginecología">Ginecología</option>
                                <option value="Cardiología">Cardiología</option>
                            </select>
                            <div class="invalid-feedback">Seleccione una especialidad válida.</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Número de Colegiatura (CMP) <span
                                    class="text-danger">*</span></label>
                            <input type="text" th:field="*{cmp}" class="form-control" required pattern="\d{5,6}"
                                th:classappend="${#fields.hasErrors('cmp')} ? 'is-invalid'" placeholder="Ej: 75421">
                            <div class="invalid-feedback">El CMP es obligatorio y debe ser numérico.</div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Correo Institucional</label>
                            <input type="email" th:field="*{email}" class="form-control"
                                th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                placeholder="medico@consultorio.com">
                            <div class="invalid-feedback">Ingrese un formato de correo válido.</div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-save me-1"></i>Guardar Médico
                        </button>
                        <a href="/medicos" class="btn btn-light px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const inputs = document.querySelectorAll('.form-control, .form-select');

            inputs.forEach(input => {
                input.addEventListener('blur', function () {
                    // Validación: Si falla o está vacío siendo requerido, marcar rojo
                    if (!this.checkValidity()) {
                        this.classList.remove('is-valid');
                        this.classList.add('is-invalid');
                    } else {
                        // Si el campo es opcional y está vacío, no ponemos marca verde
                        if (this.value.trim() === "" && !this.hasAttribute('required')) {
                            this.classList.remove('is-invalid', 'is-valid');
                        } else {
                            this.classList.remove('is-invalid');
                            this.classList.add('is-valid');
                        }
                    }
                });
            });
        });
    </script>
</body>

</html>
